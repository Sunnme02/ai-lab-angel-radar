<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-label="Direction graph demo">
  <rect width="980" height="560" rx="18" fill="#fbfbf8"/>
  <style>
    .title{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
    .sub{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#64748b}
    .label{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#111827}
    .small{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#475569}
    .edge{stroke:#94a3b8;stroke-linecap:round;opacity:.75}
    .advise{stroke:#7c3aed;stroke-linecap:round;opacity:.6}
  </style>
  <text x="34" y="48" class="title">Direction Search</text>
  <text x="34" y="76" class="sub">Input an AI direction, then generate a professor/student knowledge graph.</text>

  <line x1="184" y1="280" x2="390" y2="140" class="edge" stroke-width="7"/>
  <line x1="184" y1="280" x2="402" y2="278" class="edge" stroke-width="5"/>
  <line x1="184" y1="280" x2="390" y2="420" class="edge" stroke-width="4"/>
  <line x1="390" y1="140" x2="610" y2="92" class="advise" stroke-width="5"/>
  <line x1="390" y1="140" x2="620" y2="154" class="advise" stroke-width="3"/>
  <line x1="402" y1="278" x2="636" y2="250" class="advise" stroke-width="6"/>
  <line x1="402" y1="278" x2="636" y2="314" class="advise" stroke-width="3"/>
  <line x1="390" y1="420" x2="610" y2="392" class="advise" stroke-width="4"/>
  <line x1="390" y1="420" x2="620" y2="460" class="advise" stroke-width="2.8"/>
  <line x1="742" y1="280" x2="390" y2="140" class="edge" stroke-width="2.2"/>
  <line x1="742" y1="280" x2="402" y2="278" class="edge" stroke-width="2.2"/>
  <line x1="742" y1="280" x2="390" y2="420" class="edge" stroke-width="2.2"/>

  <circle cx="184" cy="280" r="58" fill="#f59e0b" stroke="#92400e" stroke-width="3"/>
  <text x="184" y="276" text-anchor="middle" class="label">AI Agent</text>
  <text x="184" y="298" text-anchor="middle" class="small">direction</text>

  <circle cx="390" cy="140" r="38" fill="#f97316" stroke="#9a3412" stroke-width="3"/>
  <text x="390" y="196" text-anchor="middle" class="label">Professor A</text>
  <circle cx="402" cy="278" r="42" fill="#f97316" stroke="#9a3412" stroke-width="3"/>
  <text x="402" y="338" text-anchor="middle" class="label">Professor B</text>
  <circle cx="390" cy="420" r="36" fill="#f97316" stroke="#9a3412" stroke-width="3"/>
  <text x="390" y="476" text-anchor="middle" class="label">Professor C</text>

  <circle cx="610" cy="92" r="20" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="610" y="62" text-anchor="middle" class="small">Student 1</text>
  <circle cx="620" cy="154" r="17" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="676" y="159" text-anchor="middle" class="small">Student 2</text>
  <circle cx="636" cy="250" r="22" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="714" y="255" text-anchor="middle" class="small">Student 3</text>
  <circle cx="636" cy="314" r="17" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="714" y="319" text-anchor="middle" class="small">Student 4</text>
  <circle cx="610" cy="392" r="20" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="690" y="397" text-anchor="middle" class="small">Student 5</text>
  <circle cx="620" cy="460" r="16" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>
  <text x="696" y="465" text-anchor="middle" class="small">Student 6</text>

  <circle cx="742" cy="280" r="30" fill="#475569" stroke="#1f2937" stroke-width="3"/>
  <text x="742" y="335" text-anchor="middle" class="label">School</text>

  <rect x="34" y="460" width="286" height="56" rx="10" fill="#fff" stroke="#e5e7eb"/>
  <circle cx="60" cy="488" r="8" fill="#f59e0b"/><text x="78" y="493" class="small">direction</text>
  <circle cx="152" cy="488" r="8" fill="#f97316"/><text x="170" y="493" class="small">professor</text>
  <circle cx="252" cy="488" r="8" fill="#2563eb"/><text x="270" y="493" class="small">student</text>
</svg>
